# Fusion panel definitions — static tiers
# Each tier fans out to its panelists, runs judge, then synthesizer.

[hivemind]
endpoint = "http://127.0.0.1:8400/v1"   # fusion calls back into HiveMind for every model

[panels.frontier]
panelists  = ["claude-opus-4-8", "gpt-5.5", "glm-5.2", "qwopus3.6-27b-v2"]
judge      = "glm-5.1"
synth      = "claude-sonnet-4-6"
timeout_ms = 90000

[panels.balanced]
panelists  = ["claude-sonnet-4-6", "gpt-5.5", "glm-5.2", "qwopus3.6-27b-v2"]
judge      = "glm-5.1"
synth      = "glm-5.1"
timeout_ms = 60000

[panels.budget]
# glm-4.5-air = cheapest ZAI cloud model (avoids VRAM contention with local qwopus)
panelists  = ["claude-haiku-4-5", "gpt-5.4-mini", "glm-4.5-air", "qwopus3.6-27b-v2"]
judge      = "glm-5.1"
synth      = "glm-5.1"
timeout_ms = 45000

[panels.test]
# ponytail: test tier using only working backends (Claude + local) for mechanism validation
# upgrade: remove once ZAI + OpenAI auth is restored
panelists  = ["claude-sonnet-4-6", "claude-haiku-4-5", "qwopus3.6-27b-v2"]
judge      = "claude-haiku-4-5"
synth      = "claude-sonnet-4-6"
timeout_ms = 60000

# ── Improve integration (/improve skill roles) ────────────────────────────────

[panels.improve-advisor]
# audit, vet, plan writing — judgment-heavy, frontier fan-out
# synth=glm-5.1 to avoid overloading :8095 (opus is already a panelist)
panelists  = ["claude-opus-4-8", "glm-5.2", "gpt-5.5"]
judge      = "claude-haiku-4-5"
synth      = "glm-5.1"
timeout_ms = 120000

[panels.improve-reviewer]
# verdict decisions (APPROVE / REVISE / BLOCK) — consensus matters
# synth=glm-5.1 to avoid overloading :8095 (opus+sonnet are panelists)
panelists  = ["claude-opus-4-8", "claude-sonnet-4-6", "glm-5.2"]
judge      = "claude-haiku-4-5"
synth      = "glm-5.1"
timeout_ms = 60000

[panels.improve-executor]
# plan execution — mechanical edits from clear spec; qwopus as local backup
panelists  = ["claude-sonnet-4-6", "qwopus3.6-27b-v2"]
judge      = "claude-haiku-4-5"
synth      = "claude-sonnet-4-6"
timeout_ms = 180000

[panels.improve-recon-local]
# ponytail: degenerate single-model panel — fusion fan-out/judge/synth all on qwopus
# accepted for routing uniformity (zero Claude cost preserved). recon is fast scan work.
# upgrade: gateway-level model alias → route directly to :11434, bypass fusion entirely
panelists  = ["qwopus3.6-27b-v2"]
judge      = "qwopus3.6-27b-v2"
synth      = "qwopus3.6-27b-v2"
timeout_ms = 30000
