# Hivemind Gateway — BatKave Production Config
# Host: BatKave (RTX 4090, 24 GB VRAM)
# Primary: TurboQuant (qwopus, llama-server) :11434 | Embeddings: Ollama nomic-embed :11435 | Carousel secondary: Gemma4 MoE :11436 | Fallback: VPS via Headscale

[gateway]
port                    = 8400
admin_port              = 8401
metrics_port            = 8402
health_interval_secs    = 10
health_failure_threshold = 3

# ── Backends ──────────────────────────────────────────────────────────────────

[[backends]]
name            = "turboquant-primary"
url             = "http://127.0.0.1:11434"
model           = "qwopus3.6-27b-v2"
priority        = 1
health_endpoint = "/health"

[[backends]]
name            = "gemma4-moe"
url             = "http://127.0.0.1:11436"
model           = "gemma4-26b-a4b"
priority        = 2
health_endpoint = "/health"
# ponytail: priority=2 = standby — gateway routes here only when turboquant-primary
# is unhealthy (carousel swapped it out). Health checker (10s poll, 3-fail ≈ 30s to
# mark dead) reconciles after a swap, so no SIGHUP/config-rewrite on model change.
# Upgrade: add an admin endpoint to force a health re-probe on swap if the ~30s
# window hurts dispatch during Phase 3 fusion sequential fan-out.

[[backends]]
name            = "zai-cloud"
url             = "https://api.z.ai"
model           = "glm-4.7"
priority        = 4
health_endpoint = ""
path_rewrite    = "/v1/chat/completions=/api/coding/paas/v4/chat/completions"
api_key_env     = "ZAI_API_KEY"

[[backends]]
name            = "zai-cloud-turbo"
url             = "https://api.z.ai"
model           = "glm-5-turbo"
priority        = 5
health_endpoint = ""
path_rewrite    = "/v1/chat/completions=/api/coding/paas/v4/chat/completions"
api_key_env     = "ZAI_API_KEY"

[[backends]]
name            = "zai-cloud-think"
url             = "https://api.z.ai"
model           = "glm-5.1"
priority        = 6
health_endpoint = ""
path_rewrite    = "/v1/chat/completions=/api/coding/paas/v4/chat/completions"
api_key_env     = "ZAI_API_KEY"

[[backends]]
name            = "zai-cloud-5.2"
url             = "https://api.z.ai"
model           = "glm-5.2"
priority        = 6
health_endpoint = ""
path_rewrite    = "/v1/chat/completions=/api/coding/paas/v4/chat/completions"
api_key_env     = "ZAI_API_KEY"
# GLM-5.2 (flagship, 1M context, High/Max effort). Effort is emitted by fusion
# transforms.go as thinking={type:enabled,effort:high} for glm-5.2.
# Cost/quota (per z.ai/blog/glm-5.2): 3x peak (14:00-18:00 UTC+8), 2x off-peak,
# 1x off-peak promo through end of Sept 2026. No cost-tracking in gateway yet.
# ponytail: no 1M-context backend — the "GLM-5.2[1m]" suffix is rejected on the
# coding/paas endpoint (error 1211 Unknown Model); it only works via the
# Anthropic-compatible Claude Code path. Standard glm-5.2 is correct here.
# Upgrade: add Anthropic-compatible backend if a HiveMind consumer needs true 1M.

[[backends]]
name            = "zai-cloud-air"
url             = "https://api.z.ai"
model           = "glm-4.5-air"
priority        = 7
health_endpoint = ""
path_rewrite    = "/v1/chat/completions=/api/coding/paas/v4/chat/completions"
api_key_env     = "ZAI_API_KEY"

# ── Claude (via claude-cli-proxy :8095, wraps official `claude -p` headless) ───

[[backends]]
name            = "claude-opus"
url             = "http://127.0.0.1:8095"
model           = "claude-opus-4-8"
priority        = 1
health_endpoint = "/health"

[[backends]]
name            = "claude-sonnet"
url             = "http://127.0.0.1:8095"
model           = "claude-sonnet-4-6"
priority        = 1
health_endpoint = "/health"

[[backends]]
name            = "claude-haiku"
url             = "http://127.0.0.1:8095"
model           = "claude-haiku-4-5"
priority        = 1
health_endpoint = "/health"

# ── OpenAI (via chatgpt-proxy :8094, Codex CLI OAuth) ─────────────────────────

[[backends]]
name            = "gpt-5.5"
url             = "http://127.0.0.1:8094"
model           = "gpt-5.5"
priority        = 1
health_endpoint = "/health"

[[backends]]
name            = "gpt-5-mini"
url             = "http://127.0.0.1:8094"
model           = "gpt-5.4-mini"   # chatgpt-proxy serves gpt-5.4-mini, not "gpt-5-mini"
priority        = 1
health_endpoint = "/health"

# ── Fusion (in-process multi-model consensus) ────────────────────────────────
# Replaces the Python sidecar (:8500). Panels route directly to backends above.

[fusion]
enabled = true

[fusion.panels.frontier]
panelists  = ["claude-opus-4-8", "gpt-5.5", "glm-5.2", "qwopus3.6-27b-v2"]
judge      = "glm-5.1"
synth      = "claude-sonnet-4-6"
timeout_ms = 90000

[fusion.panels.balanced]
panelists  = ["claude-sonnet-4-6", "gpt-5.5", "glm-5.2", "qwopus3.6-27b-v2"]
judge      = "glm-5.1"
synth      = "glm-5.1"
timeout_ms = 60000

[fusion.panels.budget]
panelists  = ["claude-haiku-4-5", "gpt-5.4-mini", "glm-4.5-air", "qwopus3.6-27b-v2"]
judge      = "glm-5.1"
synth      = "glm-5.1"
timeout_ms = 45000

[fusion.panels.test]
# ponytail: test tier using only working backends — upgrade: remove once ZAI + OpenAI auth restored
panelists  = ["claude-sonnet-4-6", "claude-haiku-4-5", "qwopus3.6-27b-v2"]
judge      = "claude-haiku-4-5"
synth      = "claude-sonnet-4-6"
timeout_ms = 60000

[fusion.panels.improve-advisor]
panelists  = ["claude-opus-4-8", "glm-5.2", "gpt-5.5"]
judge      = "claude-haiku-4-5"
synth      = "glm-5.1"
timeout_ms = 120000

[fusion.panels.improve-reviewer]
panelists  = ["claude-opus-4-8", "claude-sonnet-4-6", "glm-5.2"]
judge      = "claude-haiku-4-5"
synth      = "glm-5.1"
timeout_ms = 60000

[fusion.panels.improve-executor]
panelists  = ["claude-sonnet-4-6", "qwopus3.6-27b-v2"]
judge      = "claude-haiku-4-5"
synth      = "claude-sonnet-4-6"
timeout_ms = 180000

[fusion.panels.improve-recon-local]
# ponytail: degenerate single-model panel — upgrade: gateway model alias, bypass fusion entirely
panelists  = ["qwopus3.6-27b-v2"]
judge      = "qwopus3.6-27b-v2"
synth      = "qwopus3.6-27b-v2"
timeout_ms = 30000

# ── PII Shield ────────────────────────────────────────────────────────────────

[pii]
endpoint          = "http://127.0.0.1:5100/scan"
enabled           = true
bypass_on_failure = false
timeout_ms        = 500

# ── Models ────────────────────────────────────────────────────────────────────

[models]
dir     = "/mnt/olympus/LLMs/gguf"
default = "qwopus3.6-27b-v2"

# ── Embeddings ────────────────────────────────────────────────────────────────

[embed]
endpoint = "http://127.0.0.1:11434"
model    = "qwen2.5:0.5b"

# ── RAG Context Injection ────────────────────────────────────────────────────

[rag.consumers.openclaude]
enabled    = true
collection = "knowledge_graph"
top_k      = 5
min_score  = 0.7

[rag.consumers.ralph-swarm]
enabled    = true
collection = "knowledge_graph"
top_k      = 3
min_score  = 0.75

[rag.consumers.rlm-swarm]
enabled    = true
collection = "knowledge_graph"
top_k      = 3
min_score  = 0.75

[rag.consumers.ceo-agent]
enabled    = true
collection = "knowledge_graph"
top_k      = 5
min_score  = 0.7

[rag.consumers.super-worker]
enabled    = true
collection = "knowledge_graph"
top_k      = 3
min_score  = 0.75
# ponytail: top_k/min_score copied from ralph-swarm — upgrade: ship-measure-add per ponytail cache pattern

# ── Consumer API Key Mapping ──────────────────────────────────────────────────
# Synthetic tokens (NOT secrets — gateway is auth-permissive, uses key only for
# consumer identification). Lets queue-daemon.py route SSH-dispatched claude CLI
# jobs to the right consumer bucket without custom HTTP headers (claude CLI
# can't set X-HiveMind-Consumer). Token travels as ANTHROPIC_API_KEY env var.
# ponytail: synthetic tokens, not real keys — upgrade: mTLS if consumer spoofing becomes a concern

[consumers.api_keys]
"sw-research" = "ralph-swarm"
"sw-rlm"      = "rlm-swarm"
"sw-panel"    = "super-worker-panel"
"sw-default"  = "super-worker"

# ── Rate Limits ───────────────────────────────────────────────────────────────

[rate_limit]
default_requests_per_minute = 60
default_burst               = 10

[rate_limit.consumers.openclaude]
requests_per_minute = 0
burst               = 0

[rate_limit.consumers.ralph-swarm]
requests_per_minute = 60
burst               = 20

[rate_limit.consumers.siteops]
requests_per_minute = 120
burst               = 30

[rate_limit.consumers.contractpilot]
requests_per_minute = 120
burst               = 30

[rate_limit.consumers.compliancebot]
requests_per_minute = 120
burst               = 30

[rate_limit.consumers.magicdocs]
requests_per_minute = 120
burst               = 30

[rate_limit.consumers.rlm-swarm]
requests_per_minute = 120
burst               = 40

[rate_limit.consumers.ceo-agent]
requests_per_minute = 30
burst               = 10

[rate_limit.consumers.super-worker]
requests_per_minute = 120
burst               = 30
# ponytail: 120/30 copied from siteops tier — upgrade: measure actual dispatch burst profile and tune

# ── Qdrant ────────────────────────────────────────────────────────────────────

[qdrant]
endpoint   = "http://127.0.0.1:6333"
collection = "knowledge_graph"

# ── Headroom Compression ──────────────────────────────────────────────────────

[compression]
enabled      = true
endpoint     = "http://127.0.0.1:9103"
min_body_size = 1000
timeout_ms   = 1000
